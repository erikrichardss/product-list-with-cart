<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <script src="https://kit.fontawesome.com/69fa385a90.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style/index.css">
  <link rel="stylesheet" href="style/mediaQuerie.css">
  <script src="script/index.js" defer></script>

  <title>Product list with cart</title>
</head>

<body>
  <main>
    <section class="products">
      <h1>Desserts</h1>
    </section>

    <section class="carts">
      <aside class="cart">
        <h2>Your Cart <span class="sizeCart">0</span></h2>

        <div class="cartEmpty">
          <img src="../assets/images/illustration-empty-cart.svg" alt="" class="imgcart">
          <p class="text-cart">Your added items will appear here</p>
        </div>

        <div class="cartItems"></div>

        <div class="containerTotal">
          <div class="totalProducts">
            <div class="details">
              <p>Total</p>
              <h2 class="totalPrice">0.00</h2>
            </div>
            <div class="confirm">
              <button class="confirmOrder">Confirm Order</button>
            </div>
        </div>
        </div>
      </aside>
    </section>
  </main>
</body>

</html>
